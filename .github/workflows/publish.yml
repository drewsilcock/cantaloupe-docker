name: Test and publish

# Tests run against a real container serving real images before anything is
# published, so a broken image cannot reach the registry.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cantaloupe_version:
        description: "Cantaloupe release to package"
        required: true
        default: "5.0.7"

env:
  # ghcr.io/<owner>/cantaloupe
  IMAGE: ghcr.io/${{ github.repository_owner }}/cantaloupe
  CANTALOUPE_VERSION: ${{ github.event.inputs.cantaloupe_version || '5.0.7' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the native (amd64) image into the local daemon so the tests can
      # actually run it. The arm64 variant is built in the publish job; a
      # multi-arch image cannot be loaded into the daemon.
      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cantaloupe-test:local
          build-args: CANTALOUPE_VERSION=${{ env.CANTALOUPE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        env:
          IMAGE: cantaloupe-test:local
          IMAGE_PREBUILT: "1"
        run: ./test/run-tests.sh

  publish:
    name: Publish
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.CANTALOUPE_VERSION }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: CANTALOUPE_VERSION=${{ env.CANTALOUPE_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published manifest
        run: docker buildx imagetools inspect "${IMAGE}:${CANTALOUPE_VERSION}"
